name: Build and deploy Yamal Bistro

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: yamal-production
  cancel-in-progress: true

env:
  IMAGE_NAME: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/next-yamal-image

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: runner
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=yamal-production
          cache-to: type=gha,mode=max,scope=yamal-production

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -Eeuo pipefail

          install -m 700 -d ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          cat > ~/.ssh/config <<EOF
          Host yamal-server
            HostName ${SSH_HOST}
            User ${SSH_USER}
            Port ${SSH_PORT}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
            ServerAliveInterval 30
            ServerAliveCountMax 3
          EOF

          chmod 600 ~/.ssh/config

      - name: Prepare directory and copy Compose file
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh yamal-server \
            'mkdir -p "$HOME/www/next-yamal-site"'

          rsync \
            --archive \
            --compress \
            -e ssh \
            docker/compose.yml \
            yamal-server:~/www/next-yamal-site/compose.yml

      - name: Login server to Docker Hub
        shell: bash
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -Eeuo pipefail

          printf '%s' "$DOCKERHUB_TOKEN" |
            ssh yamal-server \
              "docker login docker.io \
                --username '$DOCKERHUB_USERNAME' \
                --password-stdin"

      - name: Deploy on server
        shell: bash
        run: |
          ssh yamal-server 'bash -se' <<'REMOTE'
          set -Eeuo pipefail

          APP_DIR="$HOME/www/next-yamal-site"
          ENV_FILE="$HOME/env/next-yamal-site/.env.production"

          cd "$APP_DIR"

          if [ ! -f "$ENV_FILE" ]; then
            echo "Не найден файл окружения: $ENV_FILE"
            exit 1
          fi

          docker network inspect caddy-network >/dev/null 2>&1 \
            || docker network create caddy-network

          docker compose \
            --env-file "$ENV_FILE" \
            -f compose.yml \
            config \
            --quiet

          trap '
            exit_code=$?
            echo "Ошибка деплоя. Состояние контейнеров:"
            docker compose --env-file "$ENV_FILE" -f compose.yml ps || true
            echo "Последние логи:"
            docker compose --env-file "$ENV_FILE" -f compose.yml logs --tail=200 || true
            exit "$exit_code"
          ' ERR

          docker compose \
            --env-file "$ENV_FILE" \
            -f compose.yml \
            up \
            --detach \
            --remove-orphans \
            --wait \
            --wait-timeout 180

          docker compose \
            --env-file "$ENV_FILE" \
            -f compose.yml \
            ps

          docker image prune \
            --force \
            --filter "until=240h"
          REMOTE
