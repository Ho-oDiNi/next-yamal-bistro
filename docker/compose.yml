name: yamal-production

services:
  yamal-bistro-web:
    image: docker.io/hooodini/next-yamal-image:latest
    pull_policy: always
    entrypoint: ["/app/docker/entrypoint.sh"]
    command: ["node", "server.js"]
    init: true

    env_file:
      - ${HOME}/env/next-yamal-site/.env.production

    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CATEGORY_IMAGES_DIR: /app/storage/category-images

    expose:
      - "3000"

    depends_on:
      db:
        condition: service_healthy

    networks:
      - yamal-internal
      - caddy-network

    volumes:
      - category-images:/app/storage/category-images

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

    restart: unless-stopped
    stop_grace_period: 30s

  db:
    image: postgres:18

    env_file:
      - ${HOME}/env/next-yamal-site/.env.production

    ports:
      - "127.0.0.1:6544:5432"

    volumes:
      - postgres-data:/var/lib/postgresql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -h 127.0.0.1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    networks:
      - yamal-internal
      - db-admin

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

    restart: unless-stopped
    stop_grace_period: 30s

volumes:
  postgres-data:
  category-images:

networks:
  yamal-internal:
    internal: true

  db-admin: {}

  caddy-network:
    external: true
    name: caddy-network
